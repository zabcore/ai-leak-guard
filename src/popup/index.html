<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Leak Guard</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <span class="popup__shield" aria-hidden="true">🛡</span>
        <h1 class="popup__title">AI Leak Guard</h1>
      </header>

      <div class="popup__count" id="total">0</div>
      <div class="popup__sub"><span id="today">0</span> today</div>
      <div class="popup__caption">leaks prevented</div>

      <label class="toggle">
        <input type="checkbox" id="toggle" checked />
        <span class="toggle__track"><span class="toggle__thumb"></span></span>
        <span class="toggle__label" id="toggle-label">Enabled</span>
      </label>

      <footer class="popup__footer">Local-only. No data leaves your device.</footer>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
